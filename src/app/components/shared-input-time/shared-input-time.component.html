<div class="shared-input-container" [formGroup]="form()" [class.open]="isOpen()">
    @if (label()) {
    <label class="label-text">
        {{ label() }}
        @if (required()) {
        <span class="required-mark">*</span>
        }
    </label>
    }

    <div class="time-field" (click)="toggleOpen($event)">
        <span class="time-value">
            {{ selectedHour() || '00' }}:{{ selectedMinute() || '00' }}
        </span>
        <span class="time-chevron custom-icon-chevron-down" [class.open]="isOpen()"></span>
    </div>

    @if (isOpen()) {
    <div class="time-dropdown">
        <div class="time-col">
            @for (opt of hours; track opt.value) {
            <button type="button" class="time-option" [class.active]="opt.value === selectedHour()"
                (click)="onHourChange(opt.value)">
                {{ opt.label }}
            </button>
            }
        </div>
        <div class="time-separator-col">:</div>
        <div class="time-col">
            @for (opt of minutes; track opt.value) {
            <button type="button" class="time-option" [class.active]="opt.value === selectedMinute()"
                (click)="onMinuteChange(opt.value)">
                {{ opt.label }}
            </button>
            }
        </div>
    </div>
    }
</div>
