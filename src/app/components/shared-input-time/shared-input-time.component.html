<div class="shared-input-container" [formGroup]="form">
    @if (label) {
    <label class="label-text">
        {{ label }}
        @if (required) {
        <span class="required-mark">*</span>
        }
    </label>
    }

    <div class="input-wrapper">
        <input type="time" [formControlName]="controlName" [placeholder]="placeholder" [required]="required" step="1"
            class="custom-input" />
    </div>
</div>
