<div class="icon-box-container">
    <div class="icon-box" (click)="toggleNotifications($event)" [class.active]="isNotificationsOpen">
        <div class="badge-container">
            <span class="custom-icon-bell vanilla-icon"></span>
            <span class="custom-badge" *ngIf="count() > 0"></span>
        </div>
    </div>

    <!-- Notifications Dropdown Menu -->
    <div class="custom-notifications-menu" *ngIf="isNotificationsOpen">
        <div class="notifications-header">
            <div class="tabs">
                <div class="tab active">
                    <span class="custom-icon-grid tab-icon"></span>
                    {{ 'notification.dropdown.tabs.all' | translate }}
                </div>
                <div class="tab">
                    <span class="custom-icon-eye-off tab-icon"></span>
                    {{ 'notification.dropdown.tabs.unread' | translate }}
                </div>
            </div>
            <button class="read-all-btn">{{ 'notification.dropdown.actions.readAll' | translate }}</button>
        </div>

        <div class="notifications-content empty">
            <div class="empty-state">
                <div class="empty-icon-wrapper">
                    <div class="orange-dot"></div>
                </div>
                <span class="empty-title">{{ 'notification.dropdown.empty.title' | translate }}</span>
                <span class="empty-subtitle">{{ 'notification.dropdown.empty.subtitle' | translate }}</span>
            </div>
        </div>
    </div>
</div>
