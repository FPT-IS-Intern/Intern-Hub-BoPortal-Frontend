<header class="app-header" [style.padding]="paddingHeader">
  <div class="header-left">
    <img class="logo" [src]="data.logo || 'assets/FPT-IS-Logo.png'" alt="Logo" />
  </div>

  <div class="header-right">
    <div class="icon-group">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" class="vanilla-icon">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <app-notifications-dropdown [count]="data.notificationsCount || 0"></app-notifications-dropdown>
      <div class="icon-box">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" class="vanilla-icon">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
      </div>
    </div>

    <app-user-profile-dropdown [data]="data" (logout)="logout()"></app-user-profile-dropdown>
  </div>
</header>
