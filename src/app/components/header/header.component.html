<header class="app-header" [style.padding]="paddingHeader">
  <div class="header-left">
    <img class="logo" [src]="data.logo || 'assets/FPT-IS-Logo.png'" alt="Logo" />
  </div>

  <div class="header-right">
    <div class="icon-group">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" class="vanilla-icon">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <div class="icon-box-container">
        <div class="icon-box" (click)="toggleNotifications($event)" [class.active]="isNotificationsOpen">
          <div class="badge-container">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round" class="vanilla-icon">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="custom-badge" *ngIf="data.notificationsCount && data.notificationsCount > 0"></span>
          </div>
        </div>

        <!-- Notifications Dropdown Menu -->
        <div class="custom-notifications-menu" *ngIf="isNotificationsOpen">
          <div class="notifications-header">
            <div class="tabs">
              <div class="tab active">Tất cả</div>
              <div class="tab">Chưa đọc</div>
            </div>
            <button class="read-all-btn">Đọc hết</button>
          </div>

          <div class="notifications-content empty">
            <div class="empty-state">
              <div class="empty-icon-wrapper">
                <div class="orange-dot"></div>
              </div>
              <span class="empty-title">Chưa có thông báo</span>
              <span class="empty-subtitle">Bạn sẽ thấy thông báo mới tại đây.</span>
            </div>
          </div>
        </div>
      </div>
      <div class="icon-box">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" class="vanilla-icon">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
      </div>
    </div>

    <app-user-profile-dropdown [data]="data" (logout)="logout()"></app-user-profile-dropdown>
  </div>
</header>
