<div class="user-profile-container">
    <div class="user-profile" (click)="toggleDropdown($event)" [class.active]="isDropdownOpen">
        <div class="avatar-box">
            <span class="custom-icon-user" style="width: 18px; height: 18px;"></span>
        </div>
        <span class="user-name">{{ data().displayName || data().userName }}</span>
        <span class="custom-icon-chevron-down" style="width: 14px; height: 14px; transition: transform 0.2s;" [class.is-rotated]="isDropdownOpen"></span>
    </div>

    <!-- Custom Dropdown Menu -->
    <div class="custom-dropdown-menu" *ngIf="isDropdownOpen">
        <div class="dropdown-user-info">
            <div class="user-details">
                <span class="full-name">{{ data().displayName }}</span>
                <span class="user-email">{{ data().userName }}</span>
            </div>
            <div class="roles-container" *ngIf="data().roles && (data().roles?.length ?? 0) > 0">
                <div class="role-badge" *ngFor="let role of data().roles">
                    {{ role.replace('ROLE_', '').replace('_', ' ') }}
                </div>
            </div>
        </div>

        <div class="dropdown-divider"></div>

        <div class="dropdown-item">
            <div class="item-icon">
                <span class="custom-icon-user" style="width: 18px; height: 18px;"></span>
            </div>
            <span class="item-label">Thông tin cá nhân</span>
        </div>
        <div class="dropdown-item">
            <span class="item-label">Cài đặt</span>
        </div>
        <div class="dropdown-item danger" (click)="onLogout()">
            <span class="item-label">Đăng xuất</span>
        </div>
    </div>
</div>
