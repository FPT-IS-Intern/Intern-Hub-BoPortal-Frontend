<div class="user-profile-container">
    <div class="user-profile" (click)="toggleDropdown($event)" [class.active]="isDropdownOpen">
        <div class="avatar-box">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round" class="user-icon-svg">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
        <span class="user-name">{{ data.userName }}</span>
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round" class="down-icon-svg" [class.rotate]="isDropdownOpen">
            <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
    </div>

    <!-- Custom Dropdown Menu -->
    <div class="custom-dropdown-menu" *ngIf="isDropdownOpen">
        <div class="dropdown-user-info">
            <div class="user-details">
                <span class="full-name">{{ data.userName }}</span>
                <span class="user-email">{{ data.email }}</span>
            </div>
            <div class="role-badge">
                {{ data.role }}
            </div>
        </div>

        <div class="dropdown-divider"></div>

        <div class="dropdown-item">
            <div class="item-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <span class="item-label">Thông tin cá nhân</span>
        </div>
        <div class="dropdown-item">
            <span class="item-label">Cài đặt</span>
        </div>
        <div class="dropdown-item danger" (click)="onLogout()">
            <span class="item-label">Đăng xuất</span>
        </div>
    </div>
</div>
