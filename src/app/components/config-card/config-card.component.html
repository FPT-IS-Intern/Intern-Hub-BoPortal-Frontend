<section class="config-card" [formGroup]="form">
    <h2 class="card-title">{{ title }}</h2>
    <div class="field-row">
        @if (type === 'number') {
        <input type="number" [formControlName]="controlName" class="field-input" />
        } @else if (type === 'select') {
        <select [formControlName]="controlName" class="field-select">
            <option value="" disabled selected>Chọn</option>
            @for (opt of options; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
            }
        </select>
        }
        @if (unit) {
        <span class="field-unit">{{ unit }}</span>
        }
    </div>
</section>
