<section class="config-card" [formGroup]="form">
    <h2 class="card-title">{{ title }}</h2>
    <div class="field-row">
        @if (type === 'select') {
        <select [formControlName]="controlName" class="field-select" [style.textAlign]="textAlign">
            <option [ngValue]="null" disabled>{{ placeholder || 'Chọn' }}</option>
            @for (opt of options; track opt.value) {
            <option [ngValue]="opt.value">{{ opt.label }}</option>
            }
        </select>
        } @else {
        <input [type]="type" [formControlName]="controlName" class="field-input" [style.textAlign]="textAlign"
            [attr.placeholder]="placeholder || null" />
        }
        @if (unit) {
        <span class="field-unit">{{ unit }}</span>
        }
    </div>
</section>
