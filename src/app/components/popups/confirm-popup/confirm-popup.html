<div class="confirm-overlay" *ngIf="isVisible" (click)="handleCancel()">
    <div class="confirm-container" (click)="$event.stopPropagation()" role="dialog" aria-modal="true"
        [attr.aria-label]="title">
        <div class="confirm-header">
            <div class="confirm-illustration" aria-hidden="true">
                <div class="confirm-icon-ring">
                    <div class="confirm-icon-core">
                        <span class="custom-icon-info"></span>
                    </div>
                </div>
            </div>
            <button type="button" class="confirm-close" (click)="handleCancel()" aria-label="Close">
                &times;
            </button>
        </div>

        <div class="confirm-body">
            <h3 class="confirm-title">{{ title }}</h3>
            <p class="confirm-message" [innerHTML]="message"></p>
        </div>

        <div class="confirm-actions">
            <button type="button" class="btn-cancel" (click)="handleCancel()">{{ cancelText }}</button>
            <button type="button" class="btn-confirm" (click)="handleConfirm()">{{ confirmText }}</button>
        </div>
    </div>
</div>
