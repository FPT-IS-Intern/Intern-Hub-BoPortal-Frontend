<div class="modal-overlay" *ngIf="isVisible" (click)="handleCancel()">
    <div class="modal-container" (click)="$event.stopPropagation()" [style.maxWidth]="maxWidth">
        <!-- Header -->
        <div class="modal-header">
            <h3 class="modal-title">{{ title }}</h3>
            <button class="modal-close-btn" (click)="handleCancel()">
                <span class="custom-icon-close"></span>
            </button>
        </div>

        <!-- Body -->
        <div class="modal-body">
            <ng-content></ng-content>
        </div>

        <!-- Footer -->
        <div class="modal-footer" *ngIf="showFooter">
            <button class="btn-cancel" (click)="handleCancel()">{{ cancelText }}</button>
            <button class="btn-save" [disabled]="okDisabled" (click)="handleSave()">{{ saveText }}</button>
        </div>
    </div>
</div>
