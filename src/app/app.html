@if (loadingService.isPageLoading()) {
<app-top-progress-bar></app-top-progress-bar>
}

<app-header-component [data]="headerData" [showControls]="!isLoginRoute" (logoutRequested)="handleLogout()">
</app-header-component>
<router-outlet></router-outlet>

@if (toastService.toastsSignal().length > 0) {
<app-toast-container></app-toast-container>
}

@if (loadingService.isGlobalLoading()) {
<app-global-overlay-spinner></app-global-overlay-spinner>
}
