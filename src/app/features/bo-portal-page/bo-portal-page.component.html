@if (viewModel$ | async; as vm) {
  <section class="page-layout">
    <div class="hero-card">
      <div class="hero-copy">
        <span class="eyebrow">BoPortal</span>
        <h1>{{ vm.title }}</h1>
        <p>{{ vm.subtitle }}</p>
      </div>

      <div class="hero-actions">
        <a routerLink="/dashboard" class="hero-link">Trang chính</a>
        <a routerLink="/settings" class="hero-link secondary">Cấu hình</a>
      </div>
    </div>

    <div class="metrics-grid">
      @for (metric of vm.metrics; track metric.label) {
        <article
          class="metric-card"
          [class.brand]="metric.tone === 'brand'"
          [class.success]="metric.tone === 'success'"
        >
          <span class="metric-label">{{ metric.label }}</span>
          <strong class="metric-value">{{ metric.value }}</strong>
        </article>
      }
    </div>
  </section>
}
