<div class="page-body">


  @if (isLoading()) {
  <div class="loading-container">
    <span nz-icon nzType="loading" class="main-loader"></span>
  </div>
  } @else if (isError()) {
  <app-no-data title="Không thể tải dữ liệu" message="Đã xảy ra lỗi khi tải danh sách cấu hình chi nhánh.">
    <span icon class="custom-icon-error error-icon"></span>
    <button action class="retry-btn" (click)="fetchConfigs()">Thử lại</button>
  </app-no-data>
  } @else {
  <div class="master-detail-container">
    <!-- Master: Branch List -->
    <app-branch-sidebar 
      [branches]="branches()" 
      [selectedBranchId]="selectedBranch()?.id"
      (selectBranch)="selectBranch($event)">
    </app-branch-sidebar>

    <!-- Detail: Config Tabs -->
    <main class="detail-panel">
      @if (selectedBranch(); as branch) {
        <div class="detail-header">
          <div class="title-group">
            <h2 class="detail-title">{{ branch.name }}</h2>
            <p class="detail-desc">{{ branch.description }}</p>
          </div>
          <div class="status-badge" [class.inactive]="!branch.isActive">
            {{ branch.isActive ? 'Đang hoạt động' : 'Ngừng hoạt động' }}
          </div>
        </div>

        <div class="custom-tabs">
          <div class="tab-header">
            <div class="tab-nav">
              <button class="tab-btn" [class.active]="activeTabIndex() === 0" (click)="onTabChange(0)">
                Vị trí Check-in
              </button>
              <button class="tab-btn" [class.active]="activeTabIndex() === 1" (click)="onTabChange(1)">
                Dải IP Wifi
              </button>
            </div>
          </div>

          <div class="tab-content">
            @if (activeTabIndex() === 0) {
              <app-location-tab 
                [locations]="branch.attendanceLocations || []"
                (addLocation)="openLocationModal()"
                (editLocation)="openLocationModal($event)"
                (deleteLocation)="confirmDeleteLocation($event)">
              </app-location-tab>
            } @else {
              <app-ip-tab 
                [ipRanges]="branch.allowedIpRanges || []"
                (addIP)="openIPModal()"
                (editIP)="openIPModal($event)"
                (deleteIP)="confirmDeleteIP($event)">
              </app-ip-tab>
            }
          </div>
        </div>
      } @else {
        <div class="no-selection">
          <app-no-data title="Chưa chọn chi nhánh"
            message="Vui lòng chọn một chi nhánh từ danh sách bên trái để quản lý cấu hình check-in.">
            <span icon class="custom-icon-box-iso selection-icon"></span>
          </app-no-data>
        </div>
      }
    </main>
  </div>
  }
</div>
