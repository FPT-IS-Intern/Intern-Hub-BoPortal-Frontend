<div class="page-body" [formGroup]="form">


  <!-- Main content -->
  @if (isError()) {
  <div class="error-container error-view">
    <app-no-data title="Lỗi tải dữ liệu" message="Đã xảy ra lỗi khi tải cấu hình bảo mật. Vui lòng thử lại.">
      <span icon class="custom-icon-error error-icon"></span>
      <button action class="btn-outline-custom retry-btn-sec" (click)="fetchConfig()">
        Thử lại
      </button>
    </app-no-data>
  </div>
  } @else {
  <div class="content-wrapper">
    <!-- Row 1: Password Policy -->
    <app-password-policy [form]="form"></app-password-policy>

    <!-- Row 2: Session Security -->
    <app-session-security [form]="form"></app-session-security>

    <!-- Row 3: Account Security -->
    <app-account-security [form]="form"></app-account-security>
  </div>

  <!-- Apply button -->
  <div class="actions">
    <button class="btn-primary-custom apply-btn" (click)="onSubmit()">
      Áp dụng
    </button>
  </div>
  }

  <app-confirm-popup [(isVisible)]="isConfirmVisible" title="Lưu lại"
    message="Bạn có muốn lưu các thay đổi cấu hình bảo mật?" cancelText="Không" confirmText="Có"
    (confirm)="handleConfirmSave()" (cancel)="handleConfirmCancel()"></app-confirm-popup>
</div>
