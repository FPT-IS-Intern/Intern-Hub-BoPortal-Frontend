<section class="config-card" [formGroup]="form">
    <h2 class="card-title">Định dạng hệ thống</h2>
    <div class="field-group">
        <label class="field-label">Ngôn ngữ</label>
        <select formControlName="language" class="field-select">
            <option value="" disabled selected>Chọn ngôn ngữ</option>
            @for (opt of languageOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
            }
        </select>
    </div>
</section>
