<div class="page-body" [formGroup]="form">
  <!-- Page header -->
  <header class="page-header">
    <nav class="breadcrumb">
      <a routerLink="/dashboard" class="breadcrumb-item home-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </a>
      <span class="breadcrumb-separator">/</span>
      <span class="breadcrumb-item">Cấu Hình Hệ Thống</span>
      <span class="breadcrumb-separator">/</span>
      <span class="breadcrumb-item active">Cấu Hình Chung</span>
    </nav>
    <h1 class="page-title">Cấu Hình Chung</h1>
  </header>

  <!-- Main content -->
  <div class="content-grid">
    <div class="content-left">
      <!-- Card 1: Danh sách thành viên -->
      <app-general-info [form]="form" (fileChange)="onLogoFileChange($event)"></app-general-info>

      <!-- Card 2: Định dạng hệ thống -->
      <app-system-format [form]="form"></app-system-format>
    </div>

    <!-- Card 3: Thời gian ghi nhận -->
    <app-time-config [form]="form"></app-time-config>
  </div>

  <!-- Apply button -->
  <div class="actions">
    <button class="apply-btn" type="button" (click)="onSubmit()">
      Áp dụng
    </button>
  </div>

  <app-confirm-popup [(isVisible)]="isConfirmVisible" title="Lưu lại"
    message="Bạn có muốn lưu các thay đổi cấu hình chung?" cancelText="Không" confirmText="Có"
    (confirm)="handleConfirmSave()" (cancel)="handleConfirmCancel()"></app-confirm-popup>
</div>
