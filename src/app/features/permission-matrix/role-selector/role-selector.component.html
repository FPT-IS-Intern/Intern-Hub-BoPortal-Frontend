<div class="role-section">
    <app-shared-dropdown 
        [options]="roleOptions()" 
        [(value)]="selectedRole" 
        (valueChange)="onRoleChange($event)"
        [placeholder]="'Vai trò'"
        class="role-select"
        width="220px">
    </app-shared-dropdown>
    <button class="btn-primary-custom refresh-btn" (click)="onRefresh()" aria-label="Làm mới">
        <span class="custom-icon-refresh"></span>
    </button>
</div>
