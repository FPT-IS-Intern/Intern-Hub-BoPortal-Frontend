<div class="role-section">
    <nz-select [(ngModel)]="selectedRole" (ngModelChange)="onRoleChange($event)" nzPlaceHolder="Vai trò" nzAllowClear
        class="role-select">
        @for (opt of roles; track opt.value) {
        <nz-option [nzValue]="opt.value" [nzLabel]="opt.label"></nz-option>
        }
    </nz-select>
    <button nz-button nzType="primary" class="refresh-btn" (click)="onRefresh()" aria-label="Làm mới">
        <span class="custom-icon-refresh"></span>
    </button>
</div>
