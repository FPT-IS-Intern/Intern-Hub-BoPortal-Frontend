<div class="page-body">
  <!-- Page header -->
  <header class="page-header">
    <nz-breadcrumb class="breadcrumb">
      <nz-breadcrumb-item>
        <a routerLink="/dashboard">
          <span nz-icon nzType="home" nzTheme="outline"></span>
        </a>
      </nz-breadcrumb-item>
      <nz-breadcrumb-item>Cấu Hình Hệ Thống</nz-breadcrumb-item>
      <nz-breadcrumb-item>Ma Trận Phân Quyền</nz-breadcrumb-item>
    </nz-breadcrumb>
    <h1 class="page-title">Ma Trận Phân Quyền</h1>
  </header>

  <!-- Toolbar: Role selector + action buttons -->
  <div class="toolbar">
    <app-role-selector [roles]="roles" [selectedRole]="selectedRoleId" (roleChange)="onRoleChange($event)"
      (refresh)="onRefresh()"></app-role-selector>
    <div class="toolbar-actions">
      <button nz-button nzType="default" class="action-btn" (click)="isCreateRoleVisible = true">
        <span nz-icon nzType="plus" nzTheme="outline"></span> Thêm vai trò
      </button>
      <button nz-button nzType="default" class="action-btn" (click)="isCreateResourceVisible = true">
        <span nz-icon nzType="plus" nzTheme="outline"></span> Thêm tài nguyên
      </button>
    </div>
  </div>

  <!-- Permission matrix table -->
  <div class="table-container">
    @if (permissionRows.length > 0) {
      <app-permission-table [columns]="permissionColumns" [rows]="permissionRows"
        (permissionChange)="permissionRows = $event"></app-permission-table>
    } @else {
      <app-no-data 
        title="Không có tài nguyên" 
        message="Vui lòng thêm tài nguyên hoặc chọn vai trò khác để xem ma trận phân quyền.">
        <span icon class="custom-icon-users" style="width: 64px; height: 64px; opacity: 0.2;"></span>
      </app-no-data>
    }
  </div>

  <!-- Apply button -->
  <div class="actions">
    <button nz-button nzType="primary" nzSize="large" [nzLoading]="isLoading" class="apply-btn" (click)="onSubmit()">
      Áp dụng
    </button>
  </div>

  <!-- Confirm save popup -->
  <app-confirm-popup [(isVisible)]="isConfirmVisible" title="Lưu lại"
    message="Bạn có muốn lưu các thay đổi ma trận phân quyền?" cancelText="Không" confirmText="Có"
    (confirm)="handleConfirmSave()" (cancel)="handleConfirmCancel()"></app-confirm-popup>

  <!-- Create role dialog -->
  <app-create-role-dialog [(isVisible)]="isCreateRoleVisible"
    (save)="onCreateRole($event)"></app-create-role-dialog>

  <!-- Create resource dialog -->
  <app-create-resource-dialog [(isVisible)]="isCreateResourceVisible"
    (save)="onCreateResource($event)"></app-create-resource-dialog>
</div>
