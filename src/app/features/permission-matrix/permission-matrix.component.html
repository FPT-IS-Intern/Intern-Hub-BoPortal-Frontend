<div class="page-body">
  <!-- Toolbar: Role selector + action buttons -->
  <div class="toolbar">
    <div class="toolbar-left">
      <app-shared-search width="300px" [value]="searchQuery()"
        [placeholder]="'permissionMatrix.toolbar.searchPlaceholder' | translate"
        (valueChange)="onSearchQueryChange($event)">
      </app-shared-search>

      <app-role-selector [roles]="roles()" [selectedRole]="selectedRoleId()" (roleChange)="onRoleChange($event)">
      </app-role-selector>
    </div>

    <div class="toolbar-actions">
      <button class="btn-secondary-custom" (click)="isCreateRoleVisible = true">
        <span class="custom-icon-package-plus"></span> {{ 'permissionMatrix.toolbar.addRole' | translate }}
      </button>
      <button class="btn-secondary-custom" (click)="isCreateResourceVisible = true">
        <span class="custom-icon-package-plus"></span> {{ 'permissionMatrix.toolbar.addResource' | translate }}
      </button>

      <div class="divider"></div>

      <button class="btn-primary-custom apply-btn" [disabled]="isLoading" (click)="onSubmit()">
        <span class="custom-icon-save"></span> {{ 'permissionMatrix.actions.apply' | translate }}
      </button>
    </div>
  </div>

  <div class="table-container">
    @if (isInitLoading()) {
      <div class="state-panel">
        <app-table-skeleton
          class="skeleton-panel"
          [columns]="6"
          [rows]="5"
          [columnWidths]="['30%','10%','10%','10%','10%','10%']">
        </app-table-skeleton>
      </div>
    } @else if (isError()) {
      <div class="error-view">
        <app-no-data [title]="'permissionMatrix.error.title' | translate"
          [message]="'permissionMatrix.error.message' | translate">
          <span icon class="custom-icon-error error-icon"></span>
          <button action class="btn-outline-custom retry-btn-sec retry-btn" (click)="fetchInitialData()">
            {{ 'permissionMatrix.error.retry' | translate }}
          </button>
        </app-no-data>
      </div>
    } @else {
      <app-permission-table [columns]="permissionColumns" [rows]="filteredRows()"
        (permissionChange)="permissionRows.set($event)"
        (ticketApproverConfig)="openTicketApproverDialog($event)"></app-permission-table>
    }
  </div>

  <!-- Confirm save popup -->
  @if (isConfirmVisible) {
  <app-confirm-popup [(isVisible)]="isConfirmVisible" [title]="'permissionMatrix.actions.confirm.title' | translate"
    [message]="'permissionMatrix.actions.confirm.message' | translate"
    [cancelText]="'permissionMatrix.actions.confirm.no' | translate"
    [confirmText]="'permissionMatrix.actions.confirm.yes' | translate"
    (confirm)="handleConfirmSave()" (cancel)="handleConfirmCancel()"></app-confirm-popup>
  }

  <!-- Create role dialog -->
  @if (isCreateRoleVisible) {
  <app-create-role-dialog [(isVisible)]="isCreateRoleVisible" (save)="onCreateRole($event)"></app-create-role-dialog>
  }

  <!-- Create resource dialog -->
  @if (isCreateResourceVisible) {
  <app-create-resource-dialog [(isVisible)]="isCreateResourceVisible"
    (save)="onCreateResource($event)"></app-create-resource-dialog>
  }

  <app-ticket-approver-dialog
    [level]="ticketApproverDialogLevel"
    [visible]="isTicketApproverDialogVisible"
    (visibleChange)="isTicketApproverDialogVisible = $event"
    [roleName]="selectedRoleName()"
  />
</div>
