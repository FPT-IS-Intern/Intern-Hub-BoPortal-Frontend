<div class="matrix-wrapper">
    <table class="permission-table">
        <thead>
            <tr>
                <th class="col-function">Chức năng</th>
                @for (col of columns; track col.key) {
                <th class="col-permission">{{ col.label }}</th>
                }
            </tr>
        </thead>
        <tbody>
            @if (rows.length > 0) {
            @for (row of rows; track row.function; let i = $index) {
            <tr [class.row-alt]="i % 2 === 1">
                <td class="col-function cell-function">{{ row.function }}</td>
                @for (col of columns; track col.key) {
                <td class="col-permission cell-checkbox">
                    <label nz-checkbox [(ngModel)]="row[col.key]" (ngModelChange)="onPermissionChange()"></label>
                </td>
                }
            </tr>
            }
            } @else {
            <tr>
                <td [attr.colspan]="columns.length + 1" class="empty-cell">
                    <app-no-data title="Không có tài nguyên"
                        message="Vui lòng thêm tài nguyên hoặc chọn vai trò khác để xem ma trận phân quyền."
                        [fullHeight]="false">
                        <span icon class="custom-icon-users" style="width: 64px; height: 64px"></span>
                    </app-no-data>
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
