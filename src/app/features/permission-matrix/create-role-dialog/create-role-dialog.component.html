<app-modal-popup [isVisible]="isVisible" (isVisibleChange)="onVisibilityChange($event)" [title]="'permissionMatrix.dialogs.createRole.title'| translate"
  [showFooter]="false" maxWidth="500px">
  <div class="premium-form-container">
    <div class="form-group">
      <label class="form-label required">{{ 'permissionMatrix.dialogs.createRole.labels.name' | translate }}</label>
      <div class="input-wrapper">
        <input type="text" [(ngModel)]="name" [placeholder]="'permissionMatrix.dialogs.createRole.placeholders.name' | translate" class="custom-input"
          [class.has-error]="!name.trim() && isTriedToSave" />
        @if (!name.trim() && isTriedToSave) {
        <span class="error-tip">{{ 'permissionMatrix.dialogs.createRole.errors.nameRequired' | translate }}</span>
        }
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">{{ 'permissionMatrix.dialogs.createRole.labels.description' | translate }}</label>
      <div class="input-wrapper">
        <textarea [(ngModel)]="description" [placeholder]="'permissionMatrix.dialogs.createRole.placeholders.description' | translate" class="custom-input custom-textarea"
          rows="3"></textarea>
      </div>
    </div>

    <div class="form-footer">
      <button type="button" class="custom-btn btn-ghost" (click)="onVisibilityChange(false)">
        {{ 'permissionMatrix.dialogs.createRole.actions.cancel' | translate }}
      </button>
      <button type="button" class="custom-btn btn-primary" (click)="onSave()" [disabled]="!name.trim()">
        {{ 'permissionMatrix.dialogs.createRole.actions.submit' | translate }}
      </button>
    </div>
  </div>
</app-modal-popup>
