<table class="notification-table">
    <thead>
        <tr>
            <th class="col-code">Mã thông báo</th>
            <th class="col-content">Nội dung</th>
            <th class="col-action">Hành động</th>
        </tr>
    </thead>
    <tbody>
        @for (record of data; track record.id) {
        <tr>
            <td class="col-code">{{ record.code }}</td>
            <td class="col-content">{{ record.content }}</td>
            <td class="col-action">
                <button class="custom-edit-btn" (click)="onEdit(record)" title="Chỉnh sửa">
                    <!-- Inline SVG for Edit Icon -->
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </button>
            </td>
        </tr>
        }
    </tbody>
</table>
