<div class="page-body">


  <!-- Table & Pagination -->
  <div class="table-wrapper">
    <app-notification-table [data]="listOfData" (edit)="onEdit($event)"></app-notification-table>

    <!-- Custom Pagination -->
    @if (total > 0) {
      <app-notification-pagination [pageIndex]="pageIndex" [pageSize]="pageSize" [total]="total"
        [pageSizeOptions]="pageSizeOptions" [displayRange]="displayRange" (pageIndexChange)="onPageIndexChange($event)"
        (pageSizeChange)="onPageSizeChange($event)" (approveAll)="onApproveAll()"></app-notification-pagination>
    }
  </div>

  <!-- Apply button -->
  <div class="actions">
    <button nz-button nzType="primary" nzSize="large" class="apply-btn" (click)="onSubmit()">
      Áp dụng
    </button>
  </div>

  <!-- Reusable Modal Popup -->
  <app-modal-popup [(isVisible)]="isModalVisible" title="Chỉnh sửa nội dung" cancelText="Cancel" saveText="Lưu"
    (save)="handleModalSave()" (cancel)="handleModalCancel()">
    @if (selectedRecord) {
    <div class="field-item">
      <span class="field-label">Mã thông báo:</span>
      <span class="field-value">{{ selectedRecord.code }}</span>
    </div>

    <div class="field-title">Nội dung</div>
    <div class="textarea-container">
      <textarea [(ngModel)]="editContent"
        class="custom-textarea"
        (focus)="onTextareaFocus($event)" maxlength="255">
        </textarea>
      <!-- Bộ đếm ký tự -->
      <div class="char-counter">
        {{ editContent.length }}/255
      </div>
    </div>
    }
  </app-modal-popup>

  <!-- Reusable Confirm Popup -->
  <app-confirm-popup [(isVisible)]="isConfirmVisible" title="Lưu lại" message="Bạn có muốn lưu các thay đổi ?"
    cancelText="Không" confirmText="Có" (confirm)="handleConfirmSave()"
    (cancel)="handleConfirmCancel()"></app-confirm-popup>
</div>
