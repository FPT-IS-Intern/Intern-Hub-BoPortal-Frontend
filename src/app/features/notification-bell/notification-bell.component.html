<div class="page-body">
  <!-- Page header -->
  <header class="page-header">
    <nz-breadcrumb class="breadcrumb">
      <nz-breadcrumb-item>
        <a routerLink="/dashboard">
          <span nz-icon nzType="home" nzTheme="outline"></span>
        </a>
      </nz-breadcrumb-item>
      <nz-breadcrumb-item>Cấu Hình Hệ Thống</nz-breadcrumb-item>
      <nz-breadcrumb-item>Thông báo</nz-breadcrumb-item>
      <nz-breadcrumb-item>Chuông thông báo</nz-breadcrumb-item>
    </nz-breadcrumb>
    <h1 class="page-title">Chuông thông báo</h1>
  </header>

  <!-- Table -->
  <div class="table-wrapper">
    <app-notification-table [data]="listOfData" (edit)="onEdit($event)"></app-notification-table>

    <!-- Pagination -->
    <app-notification-pagination [pageIndex]="pageIndex" [pageSize]="pageSize" [total]="total"
      [pageSizeOptions]="pageSizeOptions" [displayRange]="displayRange" (pageIndexChange)="onPageIndexChange($event)"
      (pageSizeChange)="onPageSizeChange($event)" (approveAll)="onApproveAll()"></app-notification-pagination>
  </div>

  <!-- Apply button -->
  <div class="actions">
    <button nz-button nzType="primary" nzSize="large" class="apply-btn" (click)="onSubmit()">
      Áp dụng
    </button>
  </div>
</div>
