<div class="pagination-bar">
    <div class="pagination-left">
        <span class="page-range">
            Hiển thị {{ displayRange }}
            <span class="info-icon" title="Thông tin hiển thị">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
            </span>
        </span>
    </div>

    <div class="pagination-right-group">
        <button class="custom-approve-btn" (click)="onApproveAll()">
            Duyệt tất cả
        </button>

        <div class="pagination-center">
            <button class="nav-btn" [disabled]="pageIndex <= 1" (click)="prevPage()">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>

            <div class="page-numbers">
                @for (page of pages; track trackPage($index, page)) {
                @if (page === '...') {
                <span class="ellipsis">...</span>
                } @else {
                <button class="page-btn" [class.active]="page === pageIndex" (click)="goToPage(page)">
                    {{ page }}
                </button>
                }
                }
            </div>

            <button class="nav-btn" [disabled]="pageIndex >= totalPages" (click)="nextPage()">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>

            <span class="total-text">Tổng {{ total }}</span>
        </div>

        <div class="pagination-right">
            <div class="custom-select-wrapper">
                <select [value]="pageSize" (change)="onPageSizeChange($event)" class="custom-page-size-select">
                    @for (opt of pageSizeOptions; track opt) {
                    <option [value]="opt">{{ opt }} / trang</option>
                    }
                </select>
                <span class="select-arrow">
                    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </span>
            </div>
        </div>
    </div>
</div>
