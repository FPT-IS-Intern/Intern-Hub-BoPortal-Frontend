<form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()" nzLayout="vertical">
    <nz-form-item>
        <nz-form-label nzRequired>Tiêu đề</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập tiêu đề (tối đa 255 ký tự)">
            <input nz-input formControlName="title" placeholder="Nhập tiêu đề thông báo" />
            <div class="char-counter">{{ validateForm.get('title')?.value?.length || 0 }}/255</div>
        </nz-form-control>
    </nz-form-item>

    <nz-form-item>
        <nz-form-label nzRequired>Nội dung</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập nội dung thông báo">
            <textarea nz-input formControlName="content" [nzAutosize]="{ minRows: 3, maxRows: 6 }"
                placeholder="Nhập nội dung thông báo"></textarea>
        </nz-form-control>
    </nz-form-item>

    <div class="row-layout">
        <nz-form-item class="flex-1">
            <nz-form-label nzRequired>Loại thông báo</nz-form-label>
            <nz-form-control>
                <nz-select formControlName="type">
                    <nz-option nzValue="System" nzLabel="Hệ thống"></nz-option>
                    <nz-option nzValue="Promotion" nzLabel="Khuyến mãi"></nz-option>
                    <nz-option nzValue="Warning" nzLabel="Cảnh báo"></nz-option>
                </nz-select>
            </nz-form-control>
        </nz-form-item>

        <nz-form-item class="flex-1">
            <nz-form-label nzRequired>Đối tượng nhận</nz-form-label>
            <nz-form-control>
                <nz-select formControlName="audience">
                    <nz-option nzValue="All" nzLabel="Tất cả người dùng"></nz-option>
                    <nz-option nzValue="Group" nzLabel="Nhóm người dùng"></nz-option>
                    <nz-option nzValue="Specific" nzLabel="Người dùng cụ thể"></nz-option>
                </nz-select>
            </nz-form-control>
        </nz-form-item>
    </div>

    <nz-form-item>
        <nz-form-label>Hành động khi nhấn (URL)</nz-form-label>
        <nz-form-control>
            <input nz-input formControlName="onclickAction" placeholder="https://example.com/..." />
        </nz-form-control>
    </nz-form-item>

    <div class="schedule-section">
        <div class="schedule-header">
            <span class="label">Hẹn giờ gửi</span>
            <nz-switch [(ngModel)]="isScheduled" [ngModelOptions]="{standalone: true}" [nzDisabled]="isReadOnly"></nz-switch>
        </div>
        @if (isScheduled) {
        <nz-form-item class="schedule-picker">
            <nz-form-control nzErrorTip="Vui lòng chọn thời gian gửi">
                <nz-date-picker formControlName="scheduleTime" nzShowTime nzFormat="yyyy-MM-dd HH:mm:ss"
                    nzPlaceHolder="Chọn ngày giờ gửi"></nz-date-picker>
            </nz-form-control>
        </nz-form-item>
        }
    </div>

    <div class="form-actions" *ngIf="!isReadOnly">
        <button nz-button type="button" (click)="onCancel()" class="cancel-btn">Hủy</button>
        <button nz-button nzType="primary" type="submit" class="submit-btn">Lưu thông báo</button>
    </div>
</form>
