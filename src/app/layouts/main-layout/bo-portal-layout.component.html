<div class="web-container">
  <app-header-component [data]="headerData" (logoutRequested)="handleLogout()"></app-header-component>

  <div class="mobile-warning">
    <div class="mobile-warning-content">
      <img src="Home-Page-Mobile.svg" alt="BoPortal Mobile" />
      <h2>BoPortal hien duoc toi uu cho man hinh lon</h2>
      <p>Vui long su dung thiet bi co man hinh rong hon de thao tac quan tri thuan tien hon.</p>
    </div>
  </div>

  <div class="main-layout">
    <div class="layout-body">
      <div class="layout-body-sidebar" [class.mobile-open]="isMobileSidebarOpen" [class.expanded]="isSidebarExpanded">
        <app-sidebar [data]="sidebarData" [isSidebarExpanded]="isSidebarExpanded"
          (sidebarToggled)="onSidebarToggle($event)" [toggleButtonIconData]="toggleButtonIconConfig"
          [closeButtonIconData]="closeButtonIconConfig"></app-sidebar>
      </div>

      <!-- Mobile Sidebar Overlay -->
      @if (isMobileSidebarOpen) {
      <div class="sidebar-overlay" (click)="closeMobileSidebar()" onkeypress=""></div>
      }

      <!-- Content - Scrollable -->
      <div class="layout-body-content">
        <div class="content-wrapper">
          <div class="breadcrumb-container">
            <app-breadcrumb [items]="breadcrumbService.breadcrumbs()"></app-breadcrumb>
          </div>
          <router-outlet />
        </div>
      </div>
    </div>
  </div>
</div>
