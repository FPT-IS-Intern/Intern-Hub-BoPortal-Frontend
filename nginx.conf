server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API to backend domain to avoid browser CORS issues.
    location /api/ {
        proxy_pass https://internhub-v2.bbtech.io.vn/api/;
        proxy_http_version 1.1;
        proxy_set_header Host internhub-v2.bbtech.io.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_ssl_server_name on;
    }

    # Do not cache index.html so the browser always gets latest build.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Long cache for fingerprinted static assets.
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Medium cache for media files.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=604800" always;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
